<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 5 100 89" fill="none" overflow="visible">
  <defs>
    <linearGradient id="g" x1="5" y1="10" x2="95" y2="87" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5E576"/>
      <stop offset="45%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9A7020"/>
    </linearGradient>
  </defs>
  <!--
    Triangle: TL(5,10)  TR(95,10)  B(50,87)
    Width=90  Height=77
    Left-edge slope:  x = 5  + (y-10)*(45/77)
    Right-edge slope: x = 95 - (y-10)*(45/77)
    Inner slash: from (78,10) to B(50,87)
      x = 78 - (y-10)*(28/77)
    Right outer: from TR(95,10) to (58,73)

    Bar endpoints land exactly on left-edge and inner-slash:
      y=35: left=20  slash=69
      y=52: left=30  slash=63
      y=65: left=37  slash=58
  -->
  <g stroke="url(#g)" stroke-width="8" stroke-linecap="butt" stroke-linejoin="miter" fill="none">
    <!-- Top bar + left diagonal  (miter join at top-left) -->
    <polyline points="95,10 5,10 50,87"/>
    <!-- Top bar right portion + right outer diagonal  (miter join at top-right) -->
    <polyline points="78,10 95,10 58,73"/>
    <!-- Inner slash: inset from TR, meets bottom tip -->
    <line x1="78" y1="10" x2="50" y2="87"/>
    <!-- Horizontal bars – span from left edge to inner slash -->
    <line x1="20" y1="35" x2="69" y2="35"/>
    <line x1="30" y1="52" x2="63" y2="52"/>
    <line x1="37" y1="65" x2="58" y2="65"/>
  </g>
</svg>
