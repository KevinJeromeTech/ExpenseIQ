version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expenseiq
      POSTGRES_PASSWORD: expenseiq
      POSTGRES_DB: expenseiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://expenseiq:expenseiq@db:5432/expenseiq
      JWT_SECRET: changeme-in-production
      PORT: 4000
    depends_on:
      - db
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata:
